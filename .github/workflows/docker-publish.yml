name: Docker Publish

on:
  push:
    branches: [ "main" ]
  release:
    types: [published]

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: bugnet
          password: Releases@BugNet

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-backend
            bugnet/flvx-backend

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./go-backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-frontend
            bugnet/flvx-frontend

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./vite-frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - name: Extract metadata (tags, labels) for Agent
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}-agent
            bugnet/flvx-agent

      - name: Build and push Agent
        uses: docker/build-push-action@v5
        with:
          context: ./go-gost
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}